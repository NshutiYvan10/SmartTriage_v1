spring.application.name=SmartTriage-server
spring.profiles.active=dev

# =====================================================================
# COMMON CONFIGURATION — Shared across all profiles
# =====================================================================

# --- Server ---
server.port=8080
server.servlet.context-path=/

# --- Jackson (Jackson 3.x in Spring Boot 4.x) ---
# Note: Jackson 3.x writes ISO-8601 dates by default (no WRITE_DATES_AS_TIMESTAMPS needed)
spring.jackson.default-property-inclusion=non_null
# Allow JSON null / absent values to map to primitive defaults (false for boolean, 0 for int, etc.)
spring.jackson.deserialization.fail-on-null-for-primitives=false

# --- JPA / Hibernate ---
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# repair-on-migrate auto-realigns flyway_schema_history checksums to the
# files on disk before each migrate. Useful in development when a
# migration file's whitespace / comments / encoding shift after the
# migration has already been applied to the database. Non-destructive:
# it only updates the schema_history table; never re-runs successful
# migrations or rolls anything back. Safe to keep on in dev. Consider
# turning OFF in production if you want strict drift detection.
spring.flyway.repair-on-migrate=true

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
# Mail is an AUXILIARY dependency (invitation emails only). Spring's MailHealthIndicator
# opens a live SMTP login on every /actuator/health call, so an unreachable / unauthenticated
# SMTP server would flip overall health to DOWN — which on Kubernetes would fail the
# liveness/readiness probe and pull a perfectly-functional clinical app OUT of rotation.
# A triage system must stay "up" for patient care even when invite email is down, so the
# mail check is excluded from the aggregate health status.
management.health.mail.enabled=false

# --- Logging ---
logging.level.com.smartTriage=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# --- JWT Configuration ---
# The signing secret MUST come from the JWT_SECRET environment variable — there is
# deliberately NO committed fallback here (a committed key lets anyone forge tokens for
# any clinician/role and reach PHI). prod & staging already require it via env
# (application-{prod,staging}.properties); local dev/test get a clearly-labelled
# dev-only key from application-dev.properties (the active profile is 'dev').
smarttriage.security.jwt.secret=${JWT_SECRET}
smarttriage.security.jwt.access-token-expiration-ms=900000
smarttriage.security.jwt.refresh-token-expiration-ms=86400000

# =====================================================================
# EMAIL / SMTP CONFIGURATION (Invitation Flow)
# =====================================================================
# Credentials come from environment variables. The SMTP password has NO committed
# fallback — it is a live secret and must never live in source control. Set SMTP_PASSWORD
# in the environment (for Gmail, a 16-char App Password; for prod, use SendGrid/AWS SES/Mailgun).
# An unset password simply means invitation emails can't be sent (the app still boots).

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:yvannshuti10@gmail.com}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# SmartTriage mail settings
smarttriage.mail.from-address=${SMTP_FROM:yvannshuti10@gmail.com}
smarttriage.mail.from-name=SmartTriage

# Frontend URL (used in invitation email links)
smarttriage.app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# =====================================================================
# IoT DEVICE MONITORING CONFIGURATION
# =====================================================================

# Heartbeat checker interval (ms) — how often the system scans for stale devices
smarttriage.iot.heartbeat-check-interval-ms=15000

# Default data interval for new devices (seconds)
smarttriage.iot.default-data-interval-seconds=5

# Default heartbeat timeout for new devices (seconds)
smarttriage.iot.default-heartbeat-timeout-seconds=30
