spring.application.name=SmartTriage-server
spring.profiles.active=dev

# =====================================================================
# COMMON CONFIGURATION — Shared across all profiles
# =====================================================================

# --- Server ---
server.port=8080
server.servlet.context-path=/

# --- Jackson (Jackson 3.x in Spring Boot 4.x) ---
# Note: Jackson 3.x writes ISO-8601 dates by default (no WRITE_DATES_AS_TIMESTAMPS needed)
spring.jackson.default-property-inclusion=non_null
# Allow JSON null / absent values to map to primitive defaults (false for boolean, 0 for int, etc.)
spring.jackson.deserialization.fail-on-null-for-primitives=false

# --- JPA / Hibernate ---
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# --- Logging ---
logging.level.com.smartTriage=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# --- JWT Configuration ---
# IMPORTANT: Override these in production with environment variables
smarttriage.security.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIHNtYXJ0dHJpYWdlIGp3dCB0b2tlbnMgaW4gZGV2ZWxvcG1lbnQ=}
smarttriage.security.jwt.access-token-expiration-ms=900000
smarttriage.security.jwt.refresh-token-expiration-ms=86400000

# =====================================================================
# EMAIL / SMTP CONFIGURATION (Invitation Flow)
# =====================================================================
# Replace these with your actual SMTP credentials.
# For Gmail: use an App Password (not your Gmail password).
# For production: use SendGrid, AWS SES, or Mailgun.

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# SmartTriage mail settings
smarttriage.mail.from-address=${SMTP_FROM:}
smarttriage.mail.from-name=SmartTriage

# Frontend URL (used in invitation email links)
smarttriage.app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# =====================================================================
# IoT DEVICE MONITORING CONFIGURATION
# =====================================================================

# Heartbeat checker interval (ms) — how often the system scans for stale devices
smarttriage.iot.heartbeat-check-interval-ms=15000

# Default data interval for new devices (seconds)
smarttriage.iot.default-data-interval-seconds=5

# Default heartbeat timeout for new devices (seconds)
smarttriage.iot.default-heartbeat-timeout-seconds=30
