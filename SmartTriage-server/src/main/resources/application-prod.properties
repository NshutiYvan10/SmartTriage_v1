# =====================================================================
# PRODUCTION PROFILE — Hospital deployment
# ALL sensitive values MUST come from environment variables
# =====================================================================

# --- PostgreSQL (Production) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# --- Security ---
smarttriage.security.jwt.secret=${JWT_SECRET}
smarttriage.security.jwt.access-token-expiration-ms=900000
smarttriage.security.jwt.refresh-token-expiration-ms=86400000

# --- Logging ---
logging.level.com.smartTriage=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.root=WARN

# --- Actuator (restricted in production) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
