# =====================================================================
# STAGING PROFILE — Pre-production environment
# =====================================================================

# --- PostgreSQL (Staging) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# --- Security ---
smarttriage.security.jwt.secret=${JWT_SECRET}
smarttriage.security.jwt.access-token-expiration-ms=900000
smarttriage.security.jwt.refresh-token-expiration-ms=43200000

# --- Logging ---
logging.level.com.smartTriage=INFO
logging.level.org.hibernate.SQL=WARN
