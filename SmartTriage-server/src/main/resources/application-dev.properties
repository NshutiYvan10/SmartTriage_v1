# =====================================================================
# DEVELOPMENT PROFILE — Local development with PostgreSQL
# =====================================================================

# --- PostgreSQL (Local) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/smarttriage_dev
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- JWT (DEV ONLY) ---
# The shared application.properties intentionally ships NO committed JWT secret (it
# requires the JWT_SECRET env var). This dev-only fallback keeps local dev + the test
# suite — both run under the 'dev' profile — booting out-of-the-box without a real
# secret. It is deliberately fake ("dev-only-insecure-..."); staging/production require
# a real JWT_SECRET env var and never see this. An env JWT_SECRET still overrides it.
smarttriage.security.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktaW5zZWN1cmUtand0LWtleS1ub3QtZm9yLXByb2R1Y3Rpb24tdXNlLXNtYXJ0dHJpYWdl}

# --- Logging ---
logging.level.com.smartTriage=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Vital Simulator (registers a simulated ESP32 device, streams vitals after nurse assignment) ---
smarttriage.simulation.enabled=true
smarttriage.simulation.interval-ms=5000
