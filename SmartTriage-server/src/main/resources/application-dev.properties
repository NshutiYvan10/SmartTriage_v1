# =====================================================================
# DEVELOPMENT PROFILE — Local development with PostgreSQL
# =====================================================================

# --- PostgreSQL (Local) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/smarttriage_dev
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- Logging ---
logging.level.com.smartTriage=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Vital Simulator (registers a simulated ESP32 device, streams vitals after nurse assignment) ---
smarttriage.simulation.enabled=true
smarttriage.simulation.interval-ms=5000
